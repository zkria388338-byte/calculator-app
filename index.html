<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scientific Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="calculator" aria-label="Scientific calculator">
      <header class="display-wrap">
        <div id="expression" class="expression" aria-live="polite"></div>
        <div class="result-row">
          <output id="result" class="result" aria-live="polite">0</output>
          <button id="copyResult" class="icon-btn" title="Copy result" aria-label="Copy result">⧉</button>
        </div>
      </header>

      <div class="keypad" role="group" aria-label="Calculator keys">
        <button data-action="memory-clear">MC</button>
        <button data-action="memory-recall">MR</button>
        <button data-action="memory-add">M+</button>
        <button data-action="memory-subtract">M-</button>
        <button data-action="clear" class="danger">C</button>

        <button data-value="(">(</button>
        <button data-value=")">)</button>
        <button data-action="backspace">⌫</button>
        <button data-value="%">%</button>
        <button data-value="^">^</button>

        <button data-fn="sin">sin</button>
        <button data-fn="cos">cos</button>
        <button data-fn="tan">tan</button>
        <button data-fn="log">log</button>
        <button data-fn="ln">ln</button>

        <button data-fn="sqrt">√</button>
        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button data-value="/">÷</button>

        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button data-value="*">×</button>
        <button data-value="-">−</button>

        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button data-value="+">+</button>
        <button data-action="equals" class="equals" rowspan="2">=</button>

        <button data-value="0" class="span-2">0</button>
        <button data-value=".">.</button>
      </div>
    </section>

    <aside class="history-panel" aria-label="Calculation history">
      <h2>History</h2>
      <ul id="historyList"></ul>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
